version: "3.8"

services:
  multi-agent-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-agent-system:latest
    container_name: multi-agent-system
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 必填：API密钥
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - SILICON_API_KEY=${SILICON_API_KEY}
      # 可选：ChromaDB持久化路径（容器内）
      - CHROMA_PATH=/app/chroma_data
      # 可选：Python环境
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # 知识库数据持久化
      - chroma_data:/app/chroma_data
      # 上传文件持久化
      - uploads:/app/uploads
      # 静态文件（如需外部挂载index.html等）
      - static:/app/static
      # 日志持久化（可选）
      - ./logs:/app/logs
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
    driver: local
  uploads:
    driver: local
  static:
    driver: local

networks:
  agent-network:
    driver: bridge
